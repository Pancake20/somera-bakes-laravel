databases:
  - name: somera-db
    databaseName: somera_production
    user: somera_admin
    plan: free

services:
  - type: web
    name: somera-bakes
    runtime: docker
    plan: free
    envVars:
      - key: APP_KEY
        value: base64:p8H5H9yP/6XkR7zWp9U5f7X3z7k8v9Y0n1M2K3L4H5I=
      - key: APP_DEBUG
        value: true
      - key: LOG_CHANNEL
        value: errorlog
      - key: APP_CIPHER
        value: AES-256-CBC
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: somera-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: somera-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: somera-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: somera-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: somera-db
          property: password
