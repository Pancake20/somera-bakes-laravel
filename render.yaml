databases:
  - name: somera-db
    databaseName: somera_production
    user: somera_admin
    plan: free

services:
  - type: web
    name: somera-bakes
    runtime: docker
    plan: free
    envVars:
      - key: APP_KEY
        generateValue: true
      - key: APP_DEBUG
        value: true
      - key: LOG_CHANNEL
        value: errorlog
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: somera-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: somera-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: somera-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: somera-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: somera-db
          property: password
